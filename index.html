<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ev3rshade</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="plant-canvas"></canvas>

    <div id="terminal">
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt"></span>
            <input id="cmd-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <!-- Vim overlay -->
    <div id="vim-overlay" class="hidden">
        <div id="vim-content"></div>
        <div id="vim-statusbar">
            <span id="vim-file"></span>
            <span id="vim-mode-label"></span>
        </div>
        <div id="vim-cmdline"></div>
    </div>

    <!-- GUI window -->
    <div id="gui-window" class="hidden">
        <div id="gui-titlebar">
            <span>ev3rshade</span>
            <button id="gui-close">✕</button>
        </div>
        <div id="gui-body">
            <p class="title">h e l l o</p>
            <p style="margin: 0 0 35px; text-align: center;">Welcome &nbsp;|&nbsp; ようこそ</p>
            <div class="layout">
                <div class="navbar">
                    <a href="#">hanako keney</a>
                    <p class="caption">(about me)</p>
                    <a href="./project.html">projects</a>
                    <p class="caption">cool things i've made</p>
                    <a href="./blog/index.html">blog</a>
                    <p class="caption">my place in the world</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
    <script src="js/terminal.js"></script>
</body>
</html>
